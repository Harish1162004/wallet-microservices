server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**,/api/users/**
        - id: wallet-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/wallets/**
        - id: expense-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/expenses/**,/api/categories/**,/api/budgets/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
