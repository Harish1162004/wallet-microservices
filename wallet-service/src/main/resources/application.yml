server:
  port: 8082

# DB auth: set SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD (or MYSQL_USER / MYSQL_PASSWORD)
spring:
  application:
    name: wallet-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/wallet_core?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:${MYSQL_USER:root}}
    password: ${SPRING_DATASOURCE_PASSWORD:${MYSQL_PASSWORD:Hari5h__116}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

app:
  jwt:
    secret: "ChangeThisToAtLeast32CharsSecretKey!!"

management:
  endpoints:
    web:
      exposure:
        include: health,info
